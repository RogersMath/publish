<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<!-- Canonical URL -->
{{ site.url }}{{ site.baseurl }}{{ page.url }}

<!-- OpenGraph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/og-image.png">

<!-- JSON-LD Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "EducationalOrganization",
  "name": "{{ site.title }}",
  "url": "{{ site.url }}{{ site.baseurl }}",
  "description": "{{ site.description }}"
}
</script>

<!-- CSS (must use site.baseurl!) -->
<link rel="stylesheet" hrefss/base.css
{{ site.baseurl }}/assets/css/layout.css
{{ site.baseurl }}/assets/css/components.css
{{ site.baseurl }}/assets/css/theme.css
